name: composer-security-update
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Update vulnerable packages
        run: |
          composer update -W --no-scripts --ignore-platform-reqs \
            guzzlehttp/guzzle guzzlehttp/psr7 laravel/framework \
            league/commonmark phpunit/phpunit psy/psysh \
            symfony/http-foundation symfony/http-kernel symfony/mailer \
            symfony/mime symfony/polyfill-intl-idn symfony/process \
            symfony/routing symfony/yaml
      - name: Commit if changed
        run: |
          git config user.email "dependabot-sweep@threeleaf.com"
          git config user.name "Security Update Bot"
          git add composer.lock
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update composer.lock to resolve security advisories" && git push)
