name: composer-security-update
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: |
          composer update -W --no-scripts --ignore-platform-reqs guzzlehttp/guzzle
      - run: |
          git config user.email "dependabot-sweep@threeleaf.com"
          git config user.name "Security Update Bot"
          git add composer.lock
          git diff --staged --quiet && echo "No changes" || (git commit -m "Bump guzzlehttp/guzzle for security advisories" && git push)
